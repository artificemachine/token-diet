name: Tests

# Runs the bats + pytest suite server-side on every push/PR to main. Prior to
# this workflow, the test suite was only enforced by the local pre-commit
# hook — a fork PR or a bypass (--no-verify) could land untested.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: bats + pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install bats-core, jq, bc, and poppler-utils (pdftotext)
        run: sudo apt-get update && sudo apt-get install -y bats jq bc poppler-utils

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.x'

      - name: Install Python test dependencies
        run: pip install -r requirements-test.txt

      - name: Run bats tests
        run: bats tests/*.bats

      - name: Run pytest
        run: pytest tests/ -q
