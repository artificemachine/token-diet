name: Feature request
description: Suggest a capability or a change in behavior
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve
      description: >
        Describe the situation, not the solution. What are you doing today, and
        where does it cost you?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What you'd like instead
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: What you've already tried
      description: >
        Existing commands, workarounds, or other tools. Helps rule out things
        that already work.
    validations:
      required: false
